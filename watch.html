<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังรับชม - AnimeStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0f0f0f; color: white; }</style>
</head>
<body>

    <nav class="p-4 bg-black flex justify-between items-center shadow-md">
        <a href="index.html" class="text-2xl font-bold text-red-600 uppercase">AnimeStream</a>
        <a href="index.html" class="text-gray-400 hover:text-white transition">← กลับหน้าแรก</a>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <div class="flex flex-col lg:flex-row gap-6">
            
            <div class="lg:w-3/4">
                <div class="aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border border-gray-800">
                    <iframe id="main-player" class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="mt-6">
                    <h2 id="current-title" class="text-2xl font-bold">Solo Leveling - ตอนที่ 01</h2>
                    <div class="flex gap-4 mt-2">
                        <span class="bg-gray-800 px-3 py-1 rounded text-xs text-gray-400">Action</span>
                        <span class="bg-gray-800 px-3 py-1 rounded text-xs text-gray-400">HD 1080p</span>
                    </div>
                </div>
            </div>

            <div class="lg:w-1/4">
                <h3 class="text-lg font-bold mb-4 border-l-4 border-red-600 pl-3">เลือกตอน</h3>
                <div class="space-y-2 overflow-y-auto max-h-[60vh] custom-scrollbar">
                    <button onclick="changeEp('Solo Leveling - ตอนที่ 01', 'https://www.youtube.com/embed/dQw4w9WgXcQ', this)" 
                        class="ep-btn w-full text-left p-4 rounded-lg bg-red-600 font-bold text-sm transition">ตอนที่ 01</button>
                    <button onclick="changeEp('Solo Leveling - ตอนที่ 02', 'https://www.youtube.com/embed/jNQXAC9IVRw', this)" 
                        class="ep-btn w-full text-left p-4 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm transition">ตอนที่ 02</button>
                    <button onclick="changeEp('Solo Leveling - ตอนที่ 03', 'https://www.youtube.com/embed/tgbNymZ7vqY', this)" 
                        class="ep-btn w-full text-left p-4 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm transition">ตอนที่ 03</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        function changeEp(title, url, btn) {
            // เปลี่ยนวิดีโอและชื่อ
            document.getElementById('main-player').src = url;
            document.getElementById('current-title').innerText = title;

            // บันทึกลงเครื่อง
            localStorage.setItem('last_watched_episode', title);

            // เปลี่ยนสีปุ่ม
            document.querySelectorAll('.ep-btn').forEach(b => {
                b.classList.remove('bg-red-600', 'font-bold');
                b.classList.add('bg-gray-800');
            });
            btn.classList.replace('bg-gray-800', 'bg-red-600');
            btn.classList.add('font-bold');
        }
    </script>
</body>
</html>
